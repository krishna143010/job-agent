# Server
server.port=${PORT:8080}

# Apify
apify.token=${APIFY_TOKEN}
apify.dataset.base-url=https://api.apify.com/v2/datasets

# Anthropic
anthropic.api-key=${ANTHROPIC_API_KEY}
anthropic.model=claude-haiku-4-5-20251001
anthropic.max-tokens=300

# Slack
slack.webhook-url=${SLACK_WEBHOOK_URL}

# Google Sheets
google.sheets.spreadsheet-id=${GOOGLE_SPREADSHEET_ID}
google.sheets.range=Jobs!A:R
google.sheets.tokenJson=${GOOGLE_SERVICE_ACCOUNT_JSON}

# Scoring threshold for Slack alert
agent.alert-threshold=${AGENT_ALERT_THRESHOLD:6}

# Your profile — used in Claude scoring prompt
agent.profile.role=${MY_ROLE:Senior Software Engineer or Software Engineer or Java Developer or Java Software Engineer or Backend Engineer or Java Full Stack Developer}
agent.profile.skills=${MY_SKILLS:Java, Spring boot}
agent.profile.preferences=${MY_PREFERENCES:product companies including services like banks, insurance etc, not consulting or staffing firms, major nature of work should be on development, not on infrastructure}
agent.profile.experience=${MY_EXPERIENCE:1-6 years}

job.max-age-hours=${JOB_MAX_AGE_HOURS:24}

# Maximum number of applicants - skip jobs with more applicants than this
job.max-applicants=${JOB_MAX_APPLICANTS:150}

# Title keywords to exclude (comma-separated, case-insensitive)
job.excluded-title-keywords=lead,principal,embedded,staff,architect,manager,director,vp,chief,head,intern,internship

# UI polling interval in seconds (default 5 minutes = 300 seconds)
ui.polling-interval-seconds=${UI_POLLING_INTERVAL:300}

# Resume file path in resources folder for tailoring
resume.file-path=${RESUME_FILE_PATH:Krushna_Chinthada_Resume.docx}

# Enable/disable resume tailoring feature (default: false)
resume.tailoring.enabled=${RESUME_TAILORING_ENABLED:true}
